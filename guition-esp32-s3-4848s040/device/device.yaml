# =============================================================================
# device.yaml  ·  Office Bed 2 Display  ·  Guition ESP32-S3-4848S040
# =============================================================================
# This file provides device-level substitutions and configuration notes.
# It is included by the main esphome.yaml via the packages mechanism.
#
# ─────────────────────────────────────────────────────────────────────────────
# SETUP CHECKLIST
# ─────────────────────────────────────────────────────────────────────────────
# 1. FONT FILE
#    lvgl.yaml references:  assets/materialdesignicons-webfont.ttf
#    Ensure the MDI webfont exists at that path relative to your ESPHome
#    config directory.  Download from:
#      https://github.com/Templarian/MaterialDesign-Webfont/blob/master/fonts/
#    Adjust the path in the two `file:` lines in lvgl.yaml if different.
#
# 2. TIME COMPONENT
#    sensors.yaml uses the ID  homeassistant_time  (ESPHome homeassistant
#    time platform).  This should already be defined in your addon/time.yaml.
#    If your repo uses a different ID, update the lambda in
#    script_update_time inside sensors.yaml.
#
# 3. BACKLIGHT LIGHT ID
#    The standby/wake logic uses the ID  display_backlight.
#    This should already be defined in your repo's hardware config.
#    If your repo uses a different ID, update the two references in
#    sensors.yaml (on_press wake handler) and lvgl.yaml (on_idle block).
#
# 4. HOME ASSISTANT PERMISSIONS
#    Enable "Allow the device to perform Home Assistant actions" in the
#    ESPHome integration settings, otherwise button actions will be blocked.
#
# 5. ENTITY IDs USED
#    Page 1 – Office / Bed 2:
#      light.standlamp1
#      light.lb_eave_01
#      light.lb_led_strip
#      switch.pl_bed2_01_switch
#      light.wordl
#      climate.bed_2          (temperature display + on/off toggle)
#
#    Page 2 – Scenes:
#      scene.breakfast
#      scene.dinner
#      scene.formal_lounging
#      scene.before_bed_2
#      scene.tv_dark_appletv
#      scene.lights_off
#
# ─────────────────────────────────────────────────────────────────────────────
# SUBSTITUTIONS  – override in your secrets.yaml or esphome.yaml as needed
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  device_name: "office-bed2-display"
  friendly_name: "Office Bed 2 Display"
  # AC turn-on mode: change to "heat", "auto", "dry" etc. if preferred
  ac_on_mode: "cool"
