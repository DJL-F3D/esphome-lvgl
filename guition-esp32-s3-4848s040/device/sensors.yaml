# =============================================================================
# sensors.yaml  ·  Office Bed 2 Display  ·  Guition ESP32-S3-4848S040
# =============================================================================
# Subscribes to Home Assistant entity states and updates LVGL widget states.
# Handles:
#   - Current temperature from climate.bed_2
#   - Time display (24-hour, updated every minute)
#   - Light / switch state → button checked state
#   - AC hvac_mode → button checked state
#   - Wake-on-touch when display is in standby
#
# NOTE: This file expects the following IDs defined in lvgl.yaml:
#   lbl_temp_p1, lbl_temp_p2   – temperature labels (pages 1 & 2)
#   lbl_time_p1, lbl_time_p2   – time labels (pages 1 & 2)
#   btn_standlamp, btn_eave_light, btn_led_strip
#   btn_bed2_switch, btn_wordl, btn_ac_bed2
#
# NOTE: This file expects the time component ID 'homeassistant_time' to be
#   defined in your addon/time.yaml (standard for this repo).
# =============================================================================

# ---------------------------------------------------------------------------
# Scripts
# ---------------------------------------------------------------------------
script:
  # Update time labels on both pages (called every minute and on boot)
  - id: script_update_time
    then:
      - lvgl.label.update:
          id: lbl_time_p1
          text: !lambda |-
            auto now = id(homeassistant_time).now();
            if (!now.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_time_p2
          text: !lambda |-
            auto now = id(homeassistant_time).now();
            if (!now.is_valid()) return std::string("--:--");
            char buf[6];
            snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
            return std::string(buf);

# ---------------------------------------------------------------------------
# Interval
# ---------------------------------------------------------------------------
interval:
  # Refresh time display every minute
  - interval: 60s
    then:
      - script.execute: script_update_time

# ---------------------------------------------------------------------------
# Sensors – pull current_temperature attribute from the climate entity
# ---------------------------------------------------------------------------
sensor:
  - platform: homeassistant
    id: ha_bed2_temperature
    entity_id: climate.bed_2
    attribute: current_temperature
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_temp_p1
            text: !lambda |-
              if (std::isnan(x)) return std::string("--.-\xB0\x43");
              char buf[10];
              snprintf(buf, sizeof(buf), "%.1f\xB0\x43", x);
              return std::string(buf);
        - lvgl.label.update:
            id: lbl_temp_p2
            text: !lambda |-
              if (std::isnan(x)) return std::string("--.-\xB0\x43");
              char buf[10];
              snprintf(buf, sizeof(buf), "%.1f\xB0\x43", x);
              return std::string(buf);

# ---------------------------------------------------------------------------
# Binary Sensors
# ---------------------------------------------------------------------------
binary_sensor:
  # ── Wake on touch when display is in standby ──────────────────────────
  - platform: touchscreen
    name: "Display Touch Wake"
    internal: true
    on_press:
      - if:
          condition: lvgl.is_paused
          then:
            - light.turn_on: display_backlight
            - lvgl.resume:

  # ── Office / Bed 2 entity states ──────────────────────────────────────
  - platform: homeassistant
    id: ha_light_standlamp
    entity_id: light.standlamp1
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_standlamp
            state:
              checked: !lambda "return x;"

  - platform: homeassistant
    id: ha_light_eave
    entity_id: light.lb_eave_01
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_eave_light
            state:
              checked: !lambda "return x;"

  - platform: homeassistant
    id: ha_light_ledstrip
    entity_id: light.lb_led_strip
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_led_strip
            state:
              checked: !lambda "return x;"

  - platform: homeassistant
    id: ha_switch_bed2
    entity_id: switch.pl_bed2_01_switch
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_bed2_switch
            state:
              checked: !lambda "return x;"

  - platform: homeassistant
    id: ha_light_wordl
    entity_id: light.wordl
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: btn_wordl
            state:
              checked: !lambda "return x;"

# ---------------------------------------------------------------------------
# Text Sensors – AC hvac_mode ("off" / "cool" / "heat" / "auto" etc.)
# ---------------------------------------------------------------------------
text_sensor:
  - platform: homeassistant
    id: ha_climate_bed2
    entity_id: climate.bed_2
    publish_initial_state: true
    on_value:
      then:
        - lvgl.widget.update:
            id: btn_ac_bed2
            state:
              # Checked (lime green) when AC is in any active mode
              checked: !lambda 'return x != "off";'
