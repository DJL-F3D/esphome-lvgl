# =============================================================================
# lvgl.yaml  ·  Office Bed 2 Display  ·  Guition ESP32-S3-4848S040
# =============================================================================
# Defines the full LVGL user interface for a 480×480 touchscreen display.
#
# PAGES
#   Page 1 – Office / Bed 2  (lights, switch, AC)
#   Page 2 – Home Scenes     (6 scene buttons)
#
# COLOUR SCHEME
#   Background  : Black  (#000000)
#   Status bar  : Very dark grey (#1A1A1A)
#   Button OFF  : Mid grey (#303030)
#   Button ON   : Lime green (#32CD32)
#   Text / icons: White (#FFFFFF)
#
# STANDBY
#   Screen turns off after 2 minutes of inactivity.
#   Touch anywhere to wake.
#
# FONT FILES
#   MDI webfont : assets/materialdesignicons-webfont.ttf
#     → Adjust the path if your repo stores the font elsewhere.
#   Text font   : Google Fonts Roboto (downloaded at compile time).
#
# LAYOUT  (480 × 480 px)
#   ┌──────────────────────────────────────────────┐
#   │  Status bar  h=48  (temp left, time right)   │
#   ├──────────────────────────────────────────────┤  y=50
#   │  Page title  h=20  (grey label)              │  y=56
#   ├──────────────────────────────────────────────┤  y=78
#   │  Button row 1  h=114                         │
#   │  Button row 2  h=114                         │
#   │  Button row 3  h=114                         │
#   ├──────────────────────────────────────────────┤  y=440
#   │  Navigation bar  h=40  (← dots →)            │
#   └──────────────────────────────────────────────┘
#
#   Buttons: 228 px wide  |  col 1 x=8  col 2 x=244
#            114 px tall  |  row y: 80 / 202 / 324
# =============================================================================

# ---------------------------------------------------------------------------
# Fonts
# ---------------------------------------------------------------------------
font:
  # Material Design Icons – 36 px  (used for button icons)
  # Path: adjust to match where your repo stores the webfont file.
  - file: "assets/materialdesignicons-webfont.ttf"
    id: font_mdi_36
    size: 36
    glyphs:
      # Page 1 – Office / Bed 2
      - "\U000F0335"   # mdi:lightbulb          → Stand Lamp
      - "\U000F06E8"   # mdi:lightbulb-outline   → Eave Light
      - "\U000F07D4"   # mdi:led-strip           → LED Strip
      - "\U000F0342"   # mdi:power-plug          → Bed Switch
      - "\U000F1313"   # mdi:led-strip-variant   → Wordl
      - "\U000F0025"   # mdi:air-conditioner     → AC
      # Page 2 – Scenes
      - "\U000F0176"   # mdi:coffee              → Breakfast
      - "\U000F0E52"   # mdi:silverware-fork-knife → Dinner
      - "\U000F04B7"   # mdi:sofa                → Formal Lounging
      - "\U000F04B2"   # mdi:sleep               → Before Bed
      - "\U000F0ECB"   # mdi:television-play     → TV Dark
      - "\U000F0425"   # mdi:power               → Lights Off

  # Roboto – 16 px  (button labels, page title)
  - file: "gfonts://Roboto"
    id: font_roboto_16
    size: 16
    extras:
      - file: "gfonts://Roboto"
        glyphs: "°C"

  # Roboto – 20 px  (status bar temperature & time)
  - file: "gfonts://Roboto"
    id: font_roboto_20
    size: 20
    extras:
      - file: "gfonts://Roboto"
        glyphs: "°C"

  # Roboto – 22 px  (navigation arrow buttons)
  - file: "gfonts://Roboto"
    id: font_roboto_22
    size: 22

# ---------------------------------------------------------------------------
# LVGL Configuration
# ---------------------------------------------------------------------------
lvgl:
  # ── Standby: pause LVGL + turn off backlight after 2 minutes idle ────
  on_idle:
    - timeout: 2min
      then:
        - light.turn_off:
            id: display_backlight
            transition_length: 500ms
        - lvgl.pause:

  # ── On ready: seed the time label with the current time ─────────────
  on_ready:
    then:
      - script.execute: script_update_time

  # ── Global theme ────────────────────────────────────────────────────
  theme:
    obj:
      scrollbar_width: 0
      border_width: 0
    btn:
      bg_color: 0x303030
      bg_opa: COVER
      border_width: 0
      radius: 12
      shadow_width: 0
      text_color: 0xFFFFFF
      # Active press: slightly lighter
      pressed:
        bg_color: 0x505050
      # Checked (entity is ON): lime green
      checked:
        bg_color: 0x32CD32
        bg_opa: COVER
        text_color: 0xFFFFFF

  # ============================================================
  # PAGE 1 – OFFICE / BED 2
  # ============================================================
  pages:
    - id: page_office_bed2
      bg_color: 0x000000
      bg_opa: COVER
      widgets:

        # ── Status bar ─────────────────────────────────────────
        - obj:
            width: 480
            height: 48
            x: 0
            y: 0
            bg_color: 0x1A1A1A
            bg_opa: COVER
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              # Temperature – left side
              - label:
                  id: lbl_temp_p1
                  x: 14
                  y: 14
                  text: "--.-°C"
                  text_font: font_roboto_20
                  text_color: 0xFFFFFF

              # Time – right side (right-aligned, 24-hour)
              - label:
                  id: lbl_time_p1
                  align: RIGHT_MID
                  x: -14
                  y: 0
                  text: "--:--"
                  text_font: font_roboto_20
                  text_color: 0xFFFFFF

        # ── Horizontal divider ──────────────────────────────────
        - obj:
            width: 480
            height: 2
            x: 0
            y: 48
            bg_color: 0x2A2A2A
            bg_opa: COVER
            border_width: 0
            radius: 0

        # ── Page subtitle ───────────────────────────────────────
        - label:
            x: 14
            y: 58
            text: "OFFICE  /  BED 2"
            text_font: font_roboto_16
            text_color: 0x606060

        # ════════════════════════════════════════════════════════
        # BUTTON GRID  –  Row 1
        # ════════════════════════════════════════════════════════

        # [R1 C1]  Stand Lamp  ──────────────────────────────────
        - btn:
            id: btn_standlamp
            checkable: true
            width: 228
            height: 114
            x: 8
            y: 80
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F0335"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Stand Lamp"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: light.toggle
                    data:
                      entity_id: light.standlamp1

        # [R1 C2]  Eave Light  ──────────────────────────────────
        - btn:
            id: btn_eave_light
            checkable: true
            width: 228
            height: 114
            x: 244
            y: 80
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F06E8"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Eave Light"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: light.toggle
                    data:
                      entity_id: light.lb_eave_01

        # ════════════════════════════════════════════════════════
        # BUTTON GRID  –  Row 2
        # ════════════════════════════════════════════════════════

        # [R2 C1]  LED Strip  ───────────────────────────────────
        - btn:
            id: btn_led_strip
            checkable: true
            width: 228
            height: 114
            x: 8
            y: 202
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F07D4"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "LED Strip"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: light.toggle
                    data:
                      entity_id: light.lb_led_strip

        # [R2 C2]  Bed Switch  ──────────────────────────────────
        - btn:
            id: btn_bed2_switch
            checkable: true
            width: 228
            height: 114
            x: 244
            y: 202
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F0342"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Bed Switch"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: switch.toggle
                    data:
                      entity_id: switch.pl_bed2_01_switch

        # ════════════════════════════════════════════════════════
        # BUTTON GRID  –  Row 3
        # ════════════════════════════════════════════════════════

        # [R3 C1]  Wordl  ───────────────────────────────────────
        - btn:
            id: btn_wordl
            checkable: true
            width: 228
            height: 114
            x: 8
            y: 324
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F1313"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Wordl"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: light.toggle
                    data:
                      entity_id: light.wordl

        # [R3 C2]  Air Conditioning  ────────────────────────────
        # Toggles between "cool" mode and "off".
        # Button is lime green when hvac_mode != "off".
        - btn:
            id: btn_ac_bed2
            checkable: true
            width: 228
            height: 114
            x: 244
            y: 324
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F0025"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "AC"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - if:
                    condition:
                      lambda: 'return id(ha_climate_bed2).state == "off";'
                    then:
                      - homeassistant.action:
                          action: climate.set_hvac_mode
                          data:
                            entity_id: climate.bed_2
                            hvac_mode: "cool"
                    else:
                      - homeassistant.action:
                          action: climate.turn_off
                          data:
                            entity_id: climate.bed_2

        # ── Navigation bar ──────────────────────────────────────
        # Back arrow (disabled on page 1 – greyed out)
        - btn:
            width: 52
            height: 34
            x: 8
            y: 444
            bg_color: 0x1A1A1A
            bg_opa: COVER
            border_width: 0
            radius: 8
            widgets:
              - label:
                  align: CENTER
                  text: "<"
                  text_font: font_roboto_22
                  text_color: 0x2A2A2A    # disabled – matches bg
            on_click:
              then: []                     # no action on first page

        # Page indicator dots  ● ○
        - label:
            align: BOTTOM_MID
            y: -14
            text: "●  ○"
            text_font: font_roboto_16
            text_color: 0x32CD32

        # Next arrow  → go to Scenes page
        - btn:
            width: 52
            height: 34
            x: 420
            y: 444
            bg_color: 0x1A1A1A
            bg_opa: COVER
            border_width: 0
            radius: 8
            widgets:
              - label:
                  align: CENTER
                  text: ">"
                  text_font: font_roboto_22
                  text_color: 0x808080
            on_click:
              then:
                - lvgl.page.show:
                    id: page_scenes
                    animation: MOVE_LEFT
                    time: 250ms

    # ============================================================
    # PAGE 2 – HOME SCENES
    # ============================================================
    - id: page_scenes
      bg_color: 0x000000
      bg_opa: COVER
      widgets:

        # ── Status bar ─────────────────────────────────────────
        - obj:
            width: 480
            height: 48
            x: 0
            y: 0
            bg_color: 0x1A1A1A
            bg_opa: COVER
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              # Temperature – left
              - label:
                  id: lbl_temp_p2
                  x: 14
                  y: 14
                  text: "--.-°C"
                  text_font: font_roboto_20
                  text_color: 0xFFFFFF

              # Time – right (24-hour)
              - label:
                  id: lbl_time_p2
                  align: RIGHT_MID
                  x: -14
                  y: 0
                  text: "--:--"
                  text_font: font_roboto_20
                  text_color: 0xFFFFFF

        # ── Horizontal divider ──────────────────────────────────
        - obj:
            width: 480
            height: 2
            x: 0
            y: 48
            bg_color: 0x2A2A2A
            bg_opa: COVER
            border_width: 0
            radius: 0

        # ── Page subtitle ───────────────────────────────────────
        - label:
            x: 14
            y: 58
            text: "SCENES"
            text_font: font_roboto_16
            text_color: 0x606060

        # ════════════════════════════════════════════════════════
        # SCENE BUTTONS  (not checkable – one-shot activation)
        # ════════════════════════════════════════════════════════

        # [R1 C1]  Breakfast  ───────────────────────────────────
        - btn:
            width: 228
            height: 114
            x: 8
            y: 80
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F0176"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Breakfast"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: scene.turn_on
                    data:
                      entity_id: scene.breakfast

        # [R1 C2]  Dinner  ──────────────────────────────────────
        - btn:
            width: 228
            height: 114
            x: 244
            y: 80
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F0E52"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Dinner"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: scene.turn_on
                    data:
                      entity_id: scene.dinner

        # [R2 C1]  Formal Lounging  ─────────────────────────────
        - btn:
            width: 228
            height: 114
            x: 8
            y: 202
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F04B7"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Formal Lounging"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: scene.turn_on
                    data:
                      entity_id: scene.formal_lounging

        # [R2 C2]  Before Bed  ──────────────────────────────────
        - btn:
            width: 228
            height: 114
            x: 244
            y: 202
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F04B2"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Before Bed"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: scene.turn_on
                    data:
                      entity_id: scene.before_bed_2

        # [R3 C1]  TV Dark – AppleTV  ───────────────────────────
        - btn:
            width: 228
            height: 114
            x: 8
            y: 324
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F0ECB"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "TV Dark"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: scene.turn_on
                    data:
                      entity_id: scene.tv_dark_appletv

        # [R3 C2]  Lights Off  ──────────────────────────────────
        - btn:
            width: 228
            height: 114
            x: 244
            y: 324
            widgets:
              - label:
                  align: CENTER
                  y: -16
                  text: "\U000F0425"
                  text_font: font_mdi_36
                  text_color: 0xFFFFFF
              - label:
                  align: CENTER
                  y: 28
                  text: "Lights Off"
                  text_font: font_roboto_16
                  text_color: 0xFFFFFF
            on_click:
              then:
                - homeassistant.action:
                    action: scene.turn_on
                    data:
                      entity_id: scene.lights_off

        # ── Navigation bar ──────────────────────────────────────
        # Back arrow  ← go to Office / Bed 2 page
        - btn:
            width: 52
            height: 34
            x: 8
            y: 444
            bg_color: 0x1A1A1A
            bg_opa: COVER
            border_width: 0
            radius: 8
            widgets:
              - label:
                  align: CENTER
                  text: "<"
                  text_font: font_roboto_22
                  text_color: 0x808080
            on_click:
              then:
                - lvgl.page.show:
                    id: page_office_bed2
                    animation: MOVE_RIGHT
                    time: 250ms

        # Page indicator dots  ○ ●
        - label:
            align: BOTTOM_MID
            y: -14
            text: "○  ●"
            text_font: font_roboto_16
            text_color: 0x32CD32

        # Forward arrow (disabled on page 2 – greyed out)
        - btn:
            width: 52
            height: 34
            x: 420
            y: 444
            bg_color: 0x1A1A1A
            bg_opa: COVER
            border_width: 0
            radius: 8
            widgets:
              - label:
                  align: CENTER
                  text: ">"
                  text_font: font_roboto_22
                  text_color: 0x2A2A2A    # disabled – matches bg
            on_click:
              then: []                     # no action on last page
