# =============================================================================
# addon/backlight.yaml
# =============================================================================
# Defines the backlight light (id: backlight).
#
# Screensaver / standby logic is handled by:
#   lvgl.on_idle (2 min)  → light.turn_off + lvgl.pause  (device/lvgl.yaml)
#   touchscreen on_press  → light.turn_on + lvgl.resume  (device/sensors.yaml)
# =============================================================================

light:
  - platform: monochromatic
    name: Backlight
    id: backlight
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 1s
    internal: true
